front:
  text: 序蓋自九鼎雲英與赤薤虹丹而並寶八瓊絳雪偕玉津風實以稱奇剎帝利之神丸可飽終日阿伽陀之珍餌能救眾生莫不精求赭鞭之原竊善青囊之術然而鵲醫罕遇荀令肺腑能語則色如土矣兔藥雖成但恃甲乙名經則疾入肓矣欲益反損雖悔莫追漫云三品已成孰是十全為上我乾一先生以修崑崙證驗欠示惟藉揉之一法療病之百源注蒙叟之養生鄙韓康之賣藥運其心中之矩垂為肘後之方證以終身效昭昭而可案易於反掌功歷歷其堪稽比摩頂放踵之為可利天下無濡首剝膚之害足導後生道光丁未六月上浣錫山侯桐謹序
  hash: sha256:4de115ab550e902c9f1d1c98c6a64c4f9079e34449cb7b5c48336a33cfe5733a
