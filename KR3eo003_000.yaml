body:
  text: 小引聖經云壹是皆以修身為本其本亂而末治者否矣垂訓簡易萬世師法也稽諸所以修者則曰正心誠意又曰齊明盛服非禮不動此修於無病時也易曰懲忿窒欲又曰慎言語節飲食此修於未病前也若病臨於身只以醫藥為修矣靈樞素問歷歷可考然亦有治病去其八九之論也推及其至淺則可治深則不治病至於不治則束手待盡者有之欲罷不能者亦有之豈非人生恨事乎設有良醫既能治病且能去病之根使受病者目見為快即死已無憾矣況翻然可不死乎況從此可長生乎何幸如之何樂如之不死若何去其病也長生若何去病根也去根若何去其積也去積若何有一言而可以終身行之者曰揉其揉若何請假賢傳引詩之語為則曰如切如磋如琢如磨者自修也若是易知易能人人得為何待於言正恐其道在邇而求諸遠事在易而求諸難也故縷述經驗信而有證為修身者忠告而善道之素問有云無形無患是有形者皆有患也能不思所以然設法去之乎詩云周雖舊邦其命維新是故君子無所不用其極道光丙午年六月立秋日天休子書引揉積論夫微之顯者積也人身皮里膜內必有津液滋潤其間乃氣血之所生也及氣血因感傷而停滯則津液變涎沫以凝結氣血可以復通凝結不能再解潛孳暗長無減有增此積之所由成也若銅鐵遇潮濕生鏽非括磨不能去正如積之非揉不消同一理也人生幼稚無積積生則絕少年氣血旺積不能生壯年氣血更旺嗜欲開難免積隨長隨消中年並生並育氣血旺則伏否則為患中年以後積漸大佔地闊同是氣血也積有餘而人反不足賓奪主食矣皮緊面鼓項粗腮縮耳反唇掀結喉露齒此形之不足於外者也再當要害之地手足則麻木癱瘓頸項則瘰癧噎嗝口舌則瘖啞歪斜耳目則聾瞶糊塗此急不待時者也倘不甚重尚可苟延逮至晚年頭尖項壅背駝肩聳腿胯直強手足痿痹四肢塞滿空隙毫無生意隔絕而人積偕亡矣此無他法惟揉以去之倘得消多長少或是一條生路也或者曰所言皆病之內症古有醫案方藥安見所謂積安見揉有效自古無此治病法也予應之曰子遵古而言內症是也獨不見生於外之癭瘤乎附體成形耗其氣血日長月大竟以致命雖有筋脂膿血石肉之別要皆氣血凝結之積古方皆以藥內消然歷見消去者十不獲一緣病在皮里膜內藥力不能到也在外揉之竟可消散今之所謂積者即如癭瘤使之反生於內得不統謂氣血之積乎獨可專仗藥力消之乎總之凡百病症皆以氣血為主通則無積不通則積新則積小久則積大不論大小內外病症果能揉之使經絡氣血通暢則病無不愈者不必先爭此揉積之名分今古也再以淺近者申之如頭痛揉提太陽及眉心立見輕爽喉痛重提項前亦見效驗小有腫痛瘡癤揉之立時解散揉之為法有益無損且可窒病之源拔病之根思患預防之道無過是者豈反不及臨渴掘井之醫藥耶且也病遇良醫實是罕逢而遠鄉僻野更無所謂醫藥矣況疳勞鼓嗝醫效難期肓上膏下藥力不到更有無力延醫市藥者尤堪憐憫也俗語云有病靠天此無法如何之詞也然則何如儘自己之心竭自己之力用日月之功保百年之命上可對天地中可對父母下可對自身今有揉曬二法既不借人之力又不費己之財矢以誠行以勤用以和守以恆凡百病症概可立愈健旺精神延年益壽此即所謂可以贊天地之化育也請自身始從古良醫代不乏人真可起死回生實是出神入化然垂名千古而心法無傳徒留醫案方藥後人則效無從今茲之道若大路然人人能為時時可行惟患人之不求不患法之不傳也集說既成弁以揉積論願先覽焉綜概黃庭經尺宅寸田可治生尺宅面也寸田兩眉間為上丹田心為絳宮田臍下三寸為下丹田莊子外物篇眥𡟬可以休老眥𡟬按也摩也以兩手按目四眥令眼神光明按𡟬皺紋可以沐浴老容古書頂中旋毛中為百會穴前寸半為前頂前三寸為囟門囟頂門也子在母胎諸竅尚閉臍納氣囟出氣既生竅開口鼻納氣閭尾泄氣囟乃漸合陰陽升降之道也說文囟頂門骨空自囟之心如絲相貫不絕六書精蘊元神何宅心為之宅元神何門囟為之門孫真人衛生歌汝欲不死修崑崙雙手揩摩常在面庭經語崑崙山名西北至高之位以喻首也下句真人身體力行得要訣而言也其天民之先覺者乎一予已試之矣有奇效焉面者統言之也非靠顴與夾車不能著力揉也一身血脈條直唯夾車十二經血脈上下匯走屈曲交互易致壅積夾車耳門下之鉤骨也此處一通內外上下皆無滯塞矣其積附於項骨之旁停於肩背脅肋腰胯腿腳外視微粗不能望見也於夾車直骨中揉之自能吊動由夾車之上下耳後出走大迎入頸人迎下消行次按三陽經魚貫不紊實非人力能致此積一去則肓上膏下無滯病自不生惟初揉卻難見功何也各處經絡久已淤閉即夾車骨亦淤積闊大先已蓋滿必得潛心耐性逐漸推動初覺氣滿充溢各處似有開裂豁然貫通功到自悉自悟也二若論平時本應常揉百會眉心眼內外眥顴夾以通氣血免致生積而頭皮緊急頸項壅粗肩背脅肋塞滿非於顴夾著骨揉之不能吊動且其消動自有先後不必亟亟亂揉也今將揉夾車及顴吊動行消之積列後一自腦後由頂鬢至夾車下去二由夾車上出至夾車下去三自夾車上出由下胲左右交至夾車下去四由夾車下出至夾車上去五由夾車下出至顴骨後去六由下夾車串上唇左右交至夾車下去七由耳門上及夾車中吊動陽明經由下胲左右交上耳門至額頂由眉稜至顴後夾前去八揉顴及夾車下尖不知長短一大根碎去此太陽經也九揉夾車吊動足少陽約自銳眥由耳門至夾車下大迎去十由耳門上靠後吊動由兩鬢太陽穴至眉心交下此積之大而成形者因其附項形與項骨同其長如帶完後自相接續其餘無事瑣贅至夾車骨或開或合忽長忽短有水到渠成之勢神乎其莫測矣而揉之順逆上下亦須見景生情神領意會不專心致知則不得也三手三陰自腹上頭走手指手三陽自手上頭走面足三陽自面下腹走足指足三陰自足入腹走頭各至交宮陰走膜內頏顙結喉柔內腋下臂腕陽走皮里肩背大椎夾車大迎人迎缺盆膻中陰陽往來上下皆附夾車內外結喉兩旁動脈人迎穴夾車橫骨中大迎穴面前橫骨陷中缺盆穴腦下項骨三節為大椎對腋處為柔內兩乳間為膻中數處皆所必經而夾車直骨尤為至要頭項清後仍揉夾車毋使再積而已四結喉即肺系氣血之總會也兩旁動脈人迎穴在皮里膜內五臟六腑與頭上及四肢通者除臍外惟此一處氣血往來上下皆在其中經脈皆在其中積即生其中一經揉散不入臟腑仍歸氣分由原經絡退回臍中至胃下大小腸之皮里膜內出屁竅精竅何以知之每揉夾車必泄氣且以淋濁便血知之六陰六陽之積上夾車反消於此清氣上升濁氣下降永無痞悶脹鼓之病矣臍下腰胯之積一概由足入腹似不再上夾車也五人身統此夾皮袋耳中之硬者為骨實處是血虛處是氣其餘筋肉皆應綿軟方是無病一經淤積骨則粗而大肉則壅而滯筋則拳而曲皮則繃而緊能無病乎凡有滯積無不宜揉隨宜而施何能執一神而明之存乎其人如六陽上頭夾車諸處宜揉六陰過莖海底諸處亦應揉也思之思之鬼神通之信夫六眉心目眥六陽經交接處夾車下胲陽經上下出入之路腎囊陽莖陰經上下會走之處十手足指尖陰陽交接處手足腕背經脈出入處手足大指後腕骨之上廉曰關陰陽交互處數處待常揉之可以流通氣血兩鬢塞滿揉山根眉心項後壅起揉夾車反推胸膈之積自腦下反至大椎亦於夾車反推結喉旁壅滿揉耳上及兩鬢兩腿胯脹滿揉海底囊莖及膝蓋後筋陽明交山根治生之地而不任揉於鼻脊蓋以膏藥方可著力也七揉要對不可偏揉久手痠則直伸兩臂用力摜兩手腕痠軟可立止此神仙自拳然之法神仙拳掐訣直臂閉目唸咒其手自摜少時訣散而拳作矣確有仙氣予因手痠而截取之先可流通氣血也淤積之處其皮糟揉破塗礬結痂愈快先以礬塗可免擦損或以大礬塊代揉兼可以括磨筋骨上之積事半而功倍矣手足指退皮綻裂出紫血擠盡即愈大積將上周身微寒出頭即止積塊雖大喉自能容梗芥作咳不礙飲食此六陰之積也八頭皮寬厚者壽象也麵皮緊薄者夭相也有積無積之分耳即中風麻木手足不仁疳勞鼓嗝癰疽瘡癘病也亦積也醫書所謂痹也飲也癥也瘕也皆是積也相書云露齒結喉餓死他州因陽明淤積唇掀縮短也山根斷兮早虛花因鼻梁四面壅高成凹形也予自揉後上下唇常合鼻脊自高起眼內眥向不容指今已綽有餘地是亦可為一證九予之揉也實無所師承苦自病而試得者也亦曾見有按摩諸書名目紛多無從記憶且莫明所以然繁而且難者也茲則一言以蔽之曰揉夾車以清頭上六陽之積下部六陰之積由足上繼之曰揉海底疏通腿胯為善後之計終仍歸總於夾車易而且簡易知易從者也今雖身試獲效實不料其至於如此之極耳積形似蛇大小長短不一常時一塊一條貼伏筋骨之間必待原處吊動勃起項間直串兩夾盤繞頸項下由結喉內去而貼伏者悉帶去矣雖極粗大喉間自然開讓予項所出不下數十百條久暫不一甚有夜半睡夢肩夾塞滿顙中作惡驚醒坐起揉消以此告人誰能信之實是去積良法何以諸書不載或以去積太速太盡有損於人乎予現身試有益無損也惟方書治風痹用白花蛇或取其形似乎雖未明言前人可謂智矣然藥服於胃中而欲令藥性速行於皮里膜內消黏著不動之死積想見其難徒耗正氣而已十莊子有云道引之士養形之人留侯世家道引不食谷注云服氣法此法不知世有傳書否然細繹道引二字之義道之使動引之使行似與揉法相近按摩諸書世固不乏惜予少見今揉而有效私意即以名此可乎倘世有古傳揉法予未及見則不免河東白首之誚否則即請以此冊為修身之嚆矢十一一隅三反此後原可無庸瑣言但予積久而多歷時許久方克盡淨恐後有為者不知究竟畏難中止以致前功之或棄也故備記巔未以勖之止吾止也進吾往也自勉而已十二予揉夾車及顴旬月以來頭積見消喉間暫清而腦後肩上仍壅意謂下者未必全由上消改揉頸項忽然由背湧起一大塊自右而上厚於項寬於肩下胲塞滿如此之大無從再為著力只就原處揉之少時由左胲下至左穴而下如此左右數次正是勇出時也十三揉至歲除腦後總未見消因思六陽經皆會大椎其積甚厚或為其蓋住或手腕不通於是先揉手腕次揉大椎積厚頗費尋覓及見骨後揉之良久骨節忽然高起湧而上行如脫殼然直上右夾下結喉中去厚皮消去一半隨去積亦多十四新正八日未刻覺周身微寒意必項後有積來專力揉腦後一時許項之左右並出二根上夾車灣入結喉二刻方完完後忽從脊中湧出一大片中硬邊軟闊五六寸右旋而入結喉亦數刻方完意者前二條是脊左右後一片是脊中帶肋積而出也入結喉分左右旋者想是腔內腔外之分也十五每於項旁揉時摸得腹中及脅下之積直衝而上走結喉內消及摸得兩肋骨尖長而忽軟揉之脫殼改為一條上消大約皆六陰之積上至夾車還而入喉雖粗大亦寬綽而行若六陽經於下胲剝削細小面上能容方始上走項後亦有粗大能上走者須揉頭頂及角吊之若脊骨四周之積必由耳門後上粗大亦可吊消仍由頂額下夾車大迎穴由頸中人迎穴入腹別無出路故也十六頭平頂軟一切皆庶幾矣忽而左邊上牙作痛知是足陽明經病揉鼻外梁反推其內左邊有積一片插入山根揉之有聲清涕直流痛亦稍止以次而下退揉人中不意鼻梁脫殼而下隨即揉散予右側臥鼻息不通十餘年矣不知何故今忽現出而消想因諸積漸清自不能容耳從此可以右側臥矣五官有病者亦可類此求之十七揉至望後面上已淨頭皮亦活大椎皮亦薄項雖粗亦乾淨惟項骨三節啞門風府大椎有硬筋蓋住摸項兩旁有箸頭大各一點不放手揉之半時許粗者亦至愈上愈粗左右連去四條後又揉耳上忽由項自耳後出二條由耳上至額角眉梢下夾車去又有二條自項骨前出耳門上直走鬢額交頂由腦後下肩去此條長而且粗時許方完不知是何經絡接連又二條鋪得甚潤行走同前而稍下亦出肩穴去或附脊之積如此出耶或因在夾車外耶俟後來者證之十八揉至各處見清獨大椎筋未消日間坐立不見形跡臥後摸項肩內尚有隱伏意者臟腑之積筋膜貫串如龍潛伏一經吊動夭矯而去至此附脊之積不能自行於是伏臥用大指帶撥帶揉隨指而上愈上愈闊撥碎者皆上壅腦後右轉至夾車內消結喉中此腔外背肋之積也至腔內之積一經吊動則自頸環圓鋪至缺盆如筒而上揉撥之則左旋於結喉內消而大椎之筋亦無矣十九二月朔夜摸兩肩其髀骨埋入積中臂動不見骨之稜角起伏其積一片中高寸余四垂而薄長闊約尺余意謂太陽經出肩繞髀必其積也揉本處不動退揉大椎為太陽交下缺盆處也盡日之功揉亦不動惟見手少陽經由耳後走耳上及耳門後亦有上者皆有稜有脊橫梗而行匯至鬢額眉心交下摸頸項間亦有跡矣於是傍頸項間揉之有左右湧上者有環圓鋪至缺盆如筒上者有貼骨脊粗大上者隨時即揉去之摸項前形如大蛇上背下腹稜起水波尖如刀刃撐滿結喉此所以梗芥作咳也可怕之至因思前次項前之積在耳門上揉以吊之今亦照前揉之隨手而上始闊寸余中幾三寸仍同前由鬢額至頂下項後兩時許方完約有行程之長不止一二丈矣仍如蛇形惟改扁耳及摸肩下之積一掃無餘為之一快而喉中亦釋然究不知是何經絡也二十數旬以來惟揉耳上及兩鬢源源而上迭出不窮腔內脅肋之積想須全上頭行故耶一日正揉間忽覺喉中緊窄似要作痛意思稍歇再揉及摸夾車耳下有積粗大塞滿其中勢不可停然料如此之大斷乎難上且盡力揉之竟改扁而上兼揉額角眉心即消二十一各處雖淨然肩項兩旁枕骨之下似尚有滯於是專揉夾車久之四面皆吊動矣三陽經自手交肩走耳後出耳上反夾車下大迎入人迎而至缺盆少陽走枕骨上出耳前太陽出夾車中陽明走夾車下角三陽經自缺盆回而上頭者皆貼喉間揉下胲尖積方上消手陽明由下胲尖繞唇鼻至山根交足陽明走上唇下胲夾車上耳前至額顱手太陽由夾車上尖反夾車外由大迎走顴至目內眥交足太陽上額交頂手少陽由膻中自喉出夾車外下角自項出耳上至目外眥交足少陽上頭角下耳後然三陽下項皆由夾車下大迎人迎也二十二自始至今從無痛癢一日正揉間兩脅兩臂奇癢似癬斷不敢搔逐處分揉三兩日串至膻中缺盆而愈想是兩處之積上消矣於是各處始有癢者上下大小久暫不一揉之即愈可見一向皮肉之木特尚未至於麻耳二十三自揉夾車以來項骨已細然大椎尚有小積一條於是拽其根以拔之愈撥愈上滿頂皆硬以為留存余積皆上也遂於缺盆前撥之撥至細與項等然後知亦一大根已半入前正面而下時許方完隨後又出兩大根兩小根完後已夜深而臥不知如何次早醒時仍是塞滿撥至良久仍是一根繼又一根左右交下想是入人迎穴矣項中已清第不知腹中尚有多少設使不撥又不知如何作病矣二十四各處已淨喉中忽作梗芥方知貼項前又有二根向外之尖所刺須於耳上揉吊乃消行逕由額角上頂下腦後自夾車闊三寸余二時方完稍下寸余接連又是二根直出耳上交頂而下惟揉頭角吊之正揉間覺其自項後左右同往上竄如以帛蒙頂此積所佔去之皮還歸原處而頂中積仍復累然揉兩夾車即消頂上腦後俱清矣二十五頭項俱清之後仍揉頂心夾車間有條塊隨即揉消一日忽然腰痠腰中向有病痛揉後久愈此或吊動而然不在意中也數日酸後繼之以痛幾不能行立無法如何盡力揉夾車以吊之半日後大塊即至本是左右雙上此則分先後上蓋粗大不容並行六十餘年腰痛之積其大無疑難得其分上也奇矣揉至夜半周身汗出痛亦止矣手足中之筋亦有吊動者可知病根之深無怪乎積之長用大指反推夾車千萬下始消完而小腹下條塊亦消矣二十六頭腰俱完後一日揉間左手小指筋縮而強知為手太陽小腸脈也揉半日左肩湧起一塊斜貫右夾下回頭由中而下而腦後乃壅乃揉耳門上方始上額頂反腦後由夾車消源源湧上其大如杯幸得暢行方知是太陽經上頭由頂反腦右邊則無又知病有左右輕重以積之多少分也二十七各處盡淨自以為是矣而夾車骨上總未能清皆項根左右而上一陣跟一陣相繼而來有肩脅串氣作痛者有膻中髮癬作癢者有背脊作蟲行者有手足抽筋作癢痛者隨出之積不復大塊長條無從再為分別矣推原其故頭上清楚之後如壇去蓋以下之積皆須上消走夾車下人迎穴即如厥陰肝經起足大趾自腿而上繞陰器抵小腹入胃屬肝絡膽上貫膈其積尚不多布於脅肋尋喉嚨脅肋多則積亦多矣必由夾車上消清方上頏顙進目系也各經皆然夾車之積所以不易淨也要之總有盡日惟問功夫之到不到耳二十八耳中聽宮穴是小腸太陽本經何以方書云耳聾耳鳴皆屬腎虛緣少陽三焦自手交肩而上直插耳根後出耳上走夾車所積皆蔽聽宮且陽明太陽過耳門出耳上始積風鳴重則聾矣予三十一歲左耳中生瘡俗名耳底是也痛悶不堪極其至也終夜掩耳繞走於庭錚然一鳴氣出而愈此耳聾之始也五十七歲後右耳輪邊常生小瘡膿潰結痂觸之痛甚十餘年雖揉亦未已也今左耳中又生小瘡一連三次出膿方愈痛亦異前而右耳輪之痛亦止莫名其所以然向意經絡左右之上即右左之下或者是乎不然何以兩耳同愈也二十九耳愈後仍揉夾車遲數日忽然周身陰面同時髮癬不似前次之僅在脅肋矣腹胯脹癢無法如何用大礬一塊連揉帶括幸未膿潰而腎囊之癢尤為甚焉囊中之筋如蚯蚓團結揉捻方散脫皮甚厚不計其次兼揉左右前後四肢之癬退皮亦愈因思六陽經上頭會頂以理推之六陰經必上莖會尖而腎囊為經絡匯走上下之處所有揉散六陰之積不得過莖逆流而為癬矣腎莖通後仍以夾車為主積之出路也前聞拳技家揉腎莖以防踢打未聞以之治病者今而始知下部之病悉可以治海底揉通筋脈無滯病不能存立見奇效方書無傳創法新奇人雖不信我已奏功神乎其神矣三十手少陽由耳後二至目銳眥足少陽起目銳眥上頭角下耳後支從耳後出耳前至目後邇來揉動似乎少陽脈交山根而下不然何以兩鬢塞滿揉山根即消耶然未見前言也意謂目生翳膜是少陽經從目後包轉以致失明若頻揉四眥及眉心山根經絡活動其翳自退目有病者曷試之曾遇幼瞽兩目皆白翳矇住叫其揉四眥一日後改滿紅絲淚出如泣惜其不願而止勢無中立焉知不能退盡復明耶新生翳揉即退已屢試屢驗矣予目久昏揉後燈下尚能作楷亦可為證矣三十一經絡起止方書具載隨在可查茲揉久覺有未盡者如六陽經自手交肩上頭由夾車附肺管入腹書所載也以理推之六陰經應自足交毛中上莖由囊附溺管入腹書所未載也陽明交鼻額太陽交額巔書所載也少陽經交山根書所未載也又私意六陽六陰皆該入腦陽在外走前陰在內走後交接而行循環無首隨在分名無另起理此皆臆說矣俟後來者駁之即以目論書云眼為肝竅五臟六腑之精氣上注於目而為之精筋骨氣血之精與脈並而為之系上屬於腦後出於項中此六經入腦之一證也經絡歌上惟心肝二經系連目系而已三十二經絡自手交肩至腦後出耳上下夾車至缺盆三陽經左右六根自缺盆回往頸夾已成十二根共十八根皆環貼頸項一經淤積經脈仍通積則淤停再積則多再多則長再長則彎彎則垂為雙頭多一根矣一根變而為三成為五十四根頸項焉得不粗翳膜取給於上頭皮焉得不緊頭上從此亦生淤積矣且垂下雙頭至肩背則駝至腰胯則痠痛至腿腳則痿痹臃腫腳氣上衝則頭痛在面前則壓於膈上五臟六腑能無病乎即如六陽經自缺盆回頭其積則垂至腿中統於下胲承漿穴揉根以吊之方始上消自頭下者則隨與足三陰上消其積如石在土日有增長以積引積久而自大雖堅硬如磐石而轉折如流沙此天留生路以與人也三十三或有問積究竟何似者予曰考之方書陰陽不和臟腑虛弱四氣七情失常所以為積聚久為癥瘕中為痰飲右為食積左為死血以予年來所覺是皆另病積則非是何也以其堅如石流如沙體其質似皆小水泡也水泡非病由少至多實足以致病如大河水漲岸邊水沫聚成大塊皆小水泡之所積也人身何以有此請譬之即如家常餘留飯菜一經受熱則酸而起泡再遲則白沫上湧皆蘊熱為之也人之腹中亦然飲食不時胃中蘊郁成熱時則有吞酸之病氣蒸而酸久必作泡泡輕而浮先氣而行周流四肢百竅氣可轉回小泡淤停黏著日積日多成條成塊凡有孔隙窒塞而百病生矣吊之能行揉之即散所以為水泡之論也予自幼右肋下有積橫梗心下醫云伏梁由來已久揉後無之又予左臂生癬內如細粟揉盡而愈此水泡之證也逢冬咳嗽吐痰手足凍瘃揉後均愈因知人病咳嗽是積尖刺礙肺管久而吐血是積大脹破肺管故血色鮮紅若積消長合血止而愈否則大吐矣推而至於噎嗝積成條塊擠住食嗓陽分開陰分閉非積之使然乎余病可以類推然仍是陰陽不和之故陰陽氣血相生何至不和譬如夫婦本和小人間之必致仳離小人者積也可不亟亟去之乎三十四凡人物秉受生氣者皆不能無病物不能自治人則可以自治天之生成於人獨厚矣得此揉法非但可以自治已病並可以治病之未生豈非素問所云至人治未病不治已病之謂耶語人曰吾不能是不為也非不能也安於吾身不能居仁由義謂之自棄也可惜乎否乎孟子曰拱把之桐梓人苟欲生之皆知所以養之者豈愛身不若桐梓哉縱無竟日長工亦隨在可偷半日閒也上登五福之二下免六極之三於己取之而已不得式者以十五六成童比較為樣如同診脈可以知積之有無以人治人復自己之本來面目無病而止非同索隱行怪之為也三十五予嘗慨治生者之惑矣既欲其病又不準其病是惑也飲食男女大欲存焉不節不時淫以生疾非欲其病乎死亡病苦大惡存焉涼熱攻補急以任醫非不準其病乎即使藥到病除而氣血已虧何如預為調攝之是耶不知服藥仍靠本人氣旺行之否亦不易見功甚有受藥病而再以藥治藥者人不受累乎補藥尤不足憑至補者無如五穀六畜設使不吃而專服補藥能長生精神乎夫人知其不可也至於人參僅止性熱原不能補益人之生氣無病調養已覺多此一層有病用之立見大害何樂乎占富有之名而自戕乎諺云藥醫不死病佛度有緣人然則欲治死病者當舍藥物而求於揉曬矣附此以勸戒者吾將以為類者緣也暴病不吃覺餓即愈新病揉之曬之即愈舊病久揉久曬亦愈如此而已三十六去冬晤孫真人修崑崙語推廣為之節節見效正如山窮水盡忽而柳暗花明境界不可思擬轉瞬即難追想隨時隨筆記之直錄無文者也意在善與人同不恤言之詳盡其中不無重複矛盾者譬之遊山獨逢佳境喜而歸告不自覺其拉雜矣芒芒助長之心只欲人知揉之可為而亦為之說僅大略未能達意也若果有為者則造道自得必另有一番境遇如山陰道上應接不暇光景亦推善同之意向後來者告有餘師矣暇計予言之是非耶非然者將謂山徑蹊間之路必無為間茅塞之理則予言更是有若無矣遇與不遇有緣無緣盡吾之心焉而已信與不信有積無積任人之意焉而已三十七自揉至今同人揉效者列後手痠麻者結喉露齒者頸結瘰癧者眼中生翳者腦漏兼痔者面生白瘤者喉痹時發者睡難翻身者指不任用者腿上生癬者以上皆揉顴夾及海底而愈至予之積久病多揉愈者散見於前矣再凡有揉者從無腦暈頭痛之病眾口同聲此修崑崙不死之明證也三十八予揉夾車起手終於海底所歷之境如此若積有淺深揉有先後殊途同歸原無一定板法也年餘竭力舊疴悉除耳目重明手足便利陽萎復起禿髮再生實不自覺為七十也壯不如人老將奚為但願後來者趁壯年行之當必精力倍增早建事業並試行有效廣為傳習同登彼岸是則予之後望也夫曬說丁亥年回蘇省親時年五十二歲因指麻唇吊頸項堅硬筋多瘰癧肩背有癬腰作蟲行雖飲食起居尚是照常惟於陽事不健而已親命就名醫診視雲氣血兩虧難期脫體非重用附桂大補氣血不可立方而散予以向服熱藥牙必出血置之因思氣血無不由頸上下不論所以然且揉頸項以圖目前不知所謂經絡也幸無甚病而頸中間亦鬆軟惟無法淨去耳又每逢行走急促胸膈作木石碰聲左脅牽痛而喘逢冬咳嗽吐痰耳足凍瘃腰腿間作痠痛此皆積久蔓延而然彼時實不知也一切尚能支持者未必非亂揉之力也後以腰腿痠痛有人傳以曬法者伏天赤身於烈日中曬之汗如水流風來涼爽不覺其熱也惟初曬必脫皮厚薄則隨其病甚至起水泡其愈極快無過二日者真化工也自是每伏必曬諸積病悉不為患而潮濕拘牽則截然而止不乞靈於草木者幾二十年矣今則無分冬夏晴日必曬間有微汗無病故也曬之功力可云大矣壯先天之元陽滋後天之真陰神光洞徹表裡不遺陰翳潛消營衛無間即使周身大積能令伏不為患非氣血充足能若是乎當積伏也血足以養之及積出也氣足以運之去邪扶正更云神乎今見孫真人格言悟而為之若有鬼神通之者遂將六十餘年之積期月盡消內外諸病一掃而清此正藉氣血之充足也非數年曬功能若斯之速乎所謂自天祐之吉無不利也倘得再假歲月揉以通氣血而癥去瘕消曬以分陰陽而清升濁降皮骨筋肉更換一番庶不負此生矣茲以揉說既集更以曬法經驗附焉同是君子求已之易事實為治病第一之良法凡男婦頭風腦漏牙疼耳腫腳氣臁瘡手足腰背筋骨疼痛風寒濕熱虛弱痠軟等症於三伏日巳午未時赤身於烈日中曬之不論新舊大小病症概能痊愈除根即婦女月事亦可曬通天地化育神工難以殫述第不可遮蓋著衣及致受熱也月之未申歲之伏也時之未申日之伏也急病則隨日可曬亦見奇效統而論之增長人之精神氣血者曬也積雖並育而不害感傷能散積解未形於以見生成之大除刈積之根本枝蔓者揉也人得復元而無贅中外更新人須益健亦以知補助之能並行不怠互相資益佇見事半功倍之效嘗以細蝨曬於烈日行走迅速生氣愈旺可以證陽生陰長循環無端之理矣此以至小者言大則萬物無日不生言豈有盡耶或曰農人終日曝曬何亦有病曰是先有內傷再受外感所致與曬何尤設使曬後壯實風寒且不侵何有於病耶自修者曷一試焉無負此野人負暄獻曝之忱也跋天地之大德曰生信有之矣然必待人力以成也如佃田然除鋤草萊五穀方茂若聽其自然則草滿而田荒矣豈天不施地不生耶由芸力之不至也積之於人也亦然臟腑筋皮秉受氣血互相生養有益無礙各完本形若至於積如鐵生鏽附骨肉臟腑以生分氣血筋膜以成初如絲粗有長無消及其至也日引月長歲粗時大非但氣血皆為所奪即部位亦為所侵空竅塞滿百病叢生人反無以自完矣養癰成患誰任其咎今得此揉法積可立消病永不生真起死回生之術宜其為養形之法矣予六十餘年之積亦云多矣竭數月之工已獲大效年餘之後一洗而淨可不謂之神速乎不知我獨如此或人人皆可如此茫茫天壤前無古人後無來者孰從而就正之哉於其完也書此一冊交子侄等留以咨訪亦有同予者否乞其鑑定焉或有同志自修仿為以保其身亦可匡予之不逮然譬若掘井九仞而不及泉猶為棄也尚各勉旃諺云修仙未成者固須日日修已成者尤須日日修一經間斷即仍不仙譬此揉工庶幾近似丙午六月立秋日天休子跋之兼以自勖云爾心之官則思思則得之不思則不得也若是乎人同此心心同此理莫不欲得而竟有不思者何也非不欲思也有所蔽而不能自主也非蔽於物也乃本身中自生之積耳夫心之於五行火也請以火喻人譬爐也食譬炭也心譬火也思譬焰也積譬灰也堅其爐多其炭去其灰火自旺焰自明出不竭用不窮至誠無息之謂也今火而不焰非火故也灰蔽之也不蔽焰明輕蔽焰微重則不焰再重則熄去灰則復焰矣心之積與火之灰同心之思不思系積之有無輕重焉有說乎曰有請以中風病證之卒然不省尚能飲食非積之蔽心重乎言語模糊猶可半了非積之蔽心輕乎次則明少暗多繼則明多暗少以漸輕以漸明明則能思矣仍以多少分耳推而言之人之殘忍刻薄乖戾執拗孰無人心而若是之異乎必是由積蔽所致又分輕重矣此惟精惟一允執厥中之所以大聖人也方書云誨言病怕治病即是病即此意也然則忠恕絜矩自反多識前言往行以畜其德人不同與曰是道心也為明而能思者言可若積蔽者復人心而不能奚暇論道心哉向惜天分限者無治心法今始得法去其積則心可復明而無思不得矣果能揉之五行無滯相養相生百節疏通萬竅玲瓏天君泰然四肢從令雖愚必明雖柔必強所謂修身在正其心誰人肯向死前休帝君簽語也幼年誦之既訝設詞之異又詫撒手之難心嚮往之或一見焉於時雙親蔭芘未涉世緣轉瞬七十年矣夢境迷離如侍膝下恍然在目前也其中四十餘年齊魯吳越楚粵燕豫馳驅南北足跡摩停地方河工官場皆歷名韁利絆辛苦備嘗此中所恃以立骨者和平簡易肯吃虧而不佔便宜常存知止有定之訓從無爭競不肯之心自幼本性直貫於今己亥冬月引見更蒙召見以才具平庸休致此天休於前也自維一芥之微草彌木卒何與輕重有無乃得仰沐聖明之恩退遂林泉之願上天默佑何因材之篤也羽漸歸陸尾遁潛淵一衣一食外無求焉不聞不問自適自樂一切世事度外置焉此自休於後也非肯從辟人之士也同夢論夢已無謂矣夢後預期重夢不更無謂乎非肯從辟世之士也逢場作戲已覺假矣場下自演獨戲不更覺假乎休已乎休矣人休我乎人不休我我休人也世休我乎世不休我我休世也休已乎休矣休乎其所當休休乎其所樂休休乎其所不得不休何所謂肯休與不肯休耶獨不意六十年前嚮往欲見之人而身蹈之也理耶數耶天耶人耶莫之為而為者天也莫之致而致者人也遂自易名曰天休子並系以偈雖休勿休作德日休其心休休何天之休休致歸來死前世事皆肯休矣惟肯休而不容於肯休者惟此身之生氣耳存其心養其性修身以俟天休而已數年以來並筆墨事亦休諉云懶於用心其實是不能收放心又安能用思心哉向有自修之法曰曬今有自修之法曰揉皆前人成法未有發明之言不著證驗之實故後人以老生常談置之而反求醫於人乞靈於草木孰從而知為脫胎換骨起死回生之神術乎故不憚覙縷立說以表張之問途已經遵而道之方信予言之不謬也茲又為之現身說法焉向云懶於用心非我之懶於用自己之心實自己之心懶為我用也是懶也何以未揉前如彼既揉後如此期月間前後各異或即前所云即是病之說耶自揉至今不知心已收得否又不知肯為我用否因作心說一首自偈一首心中不似竟無頭緒者不知是否揉而收得一而二二而一者也然耶否耶若果然耶則懶竟是病矣既可揉去則凡心之失其常者無莫非病且無莫不可揉而復之也予眼白向多紅絲揉後盡消以此推之心有翳膜當亦可退功夫到時自必有驗今則不敢必也後亦未可諒也以上三則揉後所得理近於揉故附於後
